name: Build iOS Unsigned

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ios-unsigned:
    name: Build unsigned iOS app
    runs-on: macos-14

    env:
      APP_TARGET: AiDiet
      PROJECT_PATH: ios/AiDiet.xcodeproj
      BUILD_DIR: build/unsigned-build
      EXPORT_PATH: build/unsigned-export
      UNSIGNED_BUNDLE_ID: com.aidiet.unsigned

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inspect iOS project
        run: |
          test -f "${PROJECT_PATH}/project.pbxproj" || (echo "Missing Xcode project file" && exit 1)
          test -f "ios/AiDiet/Info.plist" || (echo "Missing Info.plist" && exit 1)
          plutil -lint "ios/AiDiet/Info.plist"

      - name: Build without code signing
        if: always()
        run: |
          mkdir -p "${EXPORT_PATH}"
          set -o pipefail
          xcodebuild \
            -project "${PROJECT_PATH}" \
            -scheme "${APP_TARGET}" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "${BUILD_DIR}" \
            TARGET_NAME="${APP_TARGET}" \
            BUNDLE_ID="${UNSIGNED_BUNDLE_ID}" \
            PRODUCT_BUNDLE_IDENTIFIER="${UNSIGNED_BUNDLE_ID}" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build 2>&1 | tee "${EXPORT_PATH}/xcodebuild.log"
          grep -nE "error:|warning:|BUILD FAILED|The following build commands failed" "${EXPORT_PATH}/xcodebuild.log" > "${EXPORT_PATH}/swift-errors.log" || true

      - name: Package unsigned app bundle
        if: always()
        run: |
          APP_PATH="${BUILD_DIR}/Build/Products/Release-iphoneos/${APP_TARGET}.app"
          if [ -d "${APP_PATH}" ]; then
            ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "${EXPORT_PATH}/${APP_TARGET}-unsigned-app.zip"
            ditto -c -k --sequesterRsrc --keepParent "${BUILD_DIR}" "${EXPORT_PATH}/${APP_TARGET}-unsigned-build.zip"
          else
            echo "Unsigned app bundle missing at ${APP_PATH}"
            echo "Build logs saved to ${EXPORT_PATH}/xcodebuild.log"
            echo "Swift errors saved to ${EXPORT_PATH}/swift-errors.log"
          fi

      - name: Upload unsigned artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LingGuang-iOS-unsigned
          path: |
            build/unsigned-export/*
          if-no-files-found: warn
