name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ios-ipa:
    name: Build signed IPA
    runs-on: macos-14

    env:
      APP_SCHEME: AiDiet
      PROJECT_PATH: ios/AiDiet.xcodeproj
      ARCHIVE_PATH: build/AiDiet.xcarchive
      EXPORT_PATH: build/export
      KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db
      DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
      BUNDLE_ID: ${{ secrets.BUNDLE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate signing secrets
        run: |
          test -n "${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}" || (echo "Missing IOS_CERTIFICATE_P12_BASE64" && exit 1)
          test -n "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" || (echo "Missing IOS_CERTIFICATE_PASSWORD" && exit 1)
          test -n "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" || (echo "Missing IOS_PROVISIONING_PROFILE_BASE64" && exit 1)
          test -n "${{ secrets.APPLE_TEAM_ID }}" || (echo "Missing APPLE_TEAM_ID" && exit 1)
          test -n "${{ secrets.BUNDLE_ID }}" || (echo "Missing BUNDLE_ID" && exit 1)

      - name: Install Apple signing assets
        run: |
          CERTIFICATE_PATH="${RUNNER_TEMP}/certificate.p12"
          PROFILE_PATH="${RUNNER_TEMP}/profile.mobileprovision"
          PROFILE_DIR="${HOME}/Library/MobileDevice/Provisioning Profiles"

          echo "${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}" | base64 --decode > "${CERTIFICATE_PATH}"
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > "${PROFILE_PATH}"

          security create-keychain -p "" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db

          mkdir -p "${PROFILE_DIR}"
          PROFILE_PLIST="${RUNNER_TEMP}/profile.plist"
          security cms -D -i "${PROFILE_PATH}" > "${PROFILE_PLIST}"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "${PROFILE_PLIST}")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "${PROFILE_PLIST}")
          cp "${PROFILE_PATH}" "${PROFILE_DIR}/${PROFILE_UUID}.mobileprovision"

          echo "PROVISIONING_PROFILE_SPECIFIER=${PROFILE_NAME}" >> "${GITHUB_ENV}"
          echo "PROVISIONING_PROFILE_UUID=${PROFILE_UUID}" >> "${GITHUB_ENV}"

      - name: Show Xcode project
        run: |
          xcodebuild -version
          xcodebuild -project "${PROJECT_PATH}" -list

      - name: Archive
        run: |
          xcodebuild \
            -project "${PROJECT_PATH}" \
            -scheme "${APP_SCHEME}" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "${ARCHIVE_PATH}" \
            DEVELOPMENT_TEAM="${DEVELOPMENT_TEAM}" \
            PRODUCT_BUNDLE_IDENTIFIER="${BUNDLE_ID}" \
            PROVISIONING_PROFILE_SPECIFIER="${PROVISIONING_PROFILE_SPECIFIER}" \
            CODE_SIGN_STYLE=Manual \
            clean archive

      - name: Export IPA
        run: |
          cat > "${RUNNER_TEMP}/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${DEVELOPMENT_TEAM}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROVISIONING_PROFILE_SPECIFIER}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "${ARCHIVE_PATH}" \
            -exportOptionsPlist "${RUNNER_TEMP}/ExportOptions.plist" \
            -exportPath "${EXPORT_PATH}"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LingGuang-IPA
          path: build/export/*.ipa
          if-no-files-found: error

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "${KEYCHAIN_PATH}" || true
